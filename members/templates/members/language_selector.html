{% load static %}
<style>
:root {
    --pill-bg: rgba(255, 255, 255, 0.05);
    --pill-border: rgba(255, 255, 255, 0.1);
    --pill-active-bg: rgba(200, 168, 75, 0.2);
    --pill-active-text: #c8a84b;
    --pill-text: rgba(255, 255, 255, 0.7);
}

.language-pill-container {
    display: inline-flex;
    background: var(--pill-bg);
    border: 1px solid var(--pill-border);
    backdrop-filter: blur(10px);
    padding: 4px;
    border-radius: 40px;
    position: relative;
    user-select: none;
    min-width: 120px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.language-pill-option {
    flex: 1;
    position: relative;
    z-index: 2;
    padding: 6px 14px;
    cursor: pointer;
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--pill-text);
    text-decoration: none;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.language-pill-option:hover {
    color: #fff;
}

.language-pill-option.active {
    color: var(--pill-active-text);
}

.language-pill-option .flag-icon {
    font-size: 14px;
    filter: grayscale(0.2);
}

.language-pill-slider {
    position: absolute;
    top: 4px;
    left: 4px;
    height: calc(100% - 8px);
    width: calc(50% - 4px);
    background: var(--pill-active-bg);
    border: 1px solid rgba(200, 168, 75, 0.3);
    border-radius: 30px;
    z-index: 1;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: inset 0 0 10px rgba(200, 168, 75, 0.1);
}

/* Slide logic */
{% with current_lang=current_language|default:'en' %}
    {% if current_lang == 'sw' %}
    .language-pill-slider {
        transform: translateX(100%);
    }
    {% endif %}
{% endwith %}

/* Pulse effect for active */
.language-pill-option.active .flag-icon {
    animation: flagPulse 2s infinite ease-in-out;
}

@keyframes flagPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
}

/* Sidebar specific overrides */
.nav-user .language-pill-container {
    margin-top: 12px;
    width: 100%;
}
</style>

<div class="language-pill-container">
    {% with current_lang=current_language|default:'en' %}
    <a href="{% url 'members:set_language' 'en' %}" 
       class="language-pill-option {% if current_lang == 'en' %}active{% endif %}"
       title="Switch to English">
        <span class="flag-icon">🇬🇧</span>
        <span>EN</span>
    </a>
    
    <a href="{% url 'members:set_language' 'sw' %}" 
       class="language-pill-option {% if current_lang == 'sw' %}active{% endif %}"
       title="Badili kwenda Kiswahili">
        <span class="flag-icon">🇹🇿</span>
        <span>SW</span>
    </a>
    
    <div class="language-pill-slider"></div>
    {% endwith %}
</div>

<script>
// Smooth transition feedback
document.querySelectorAll('.language-pill-option').forEach(option => {
    option.addEventListener('click', function(e) {
        // Just for visual immediate feedback before page reload
        const container = this.closest('.language-pill-container');
        const slider = container.querySelector('.language-pill-slider');
        const options = container.querySelectorAll('.language-pill-option');
        
        options.forEach(opt => opt.classList.remove('active'));
        this.classList.add('active');
        
        if (this.textContent.includes('SW')) {
            slider.style.transform = 'translateX(100%)';
        } else {
            slider.style.transform = 'translateX(0)';
        }
    });
});
</script>
