// Dashboard content translations
const DASHBOARD_LABELS = {
    'en': {
        'total_members': 'Total Members',
        'active_members': 'Active Members',
        'new_members_this_month': 'New Members This Month',

// Function to get translated label
function getLabel(key, language = 'en', type = 'navigation') {
    const labels = type === 'dashboard' ? DASHBOARD_LABELS : NAVIGATION_LABELS;
    return labels[language]?.[key] || labels['en'][key] || key;
}

// Function to update all navigation labels based on current language
function updateNavigationLabels() {
    // Get language from session storage first, then fallback to template variable
    const currentLanguage = sessionStorage.getItem('selectedLanguage') || '{{ current_language|default:"en" }}';
    
    // Update navigation items
    document.querySelectorAll('.nav-item').forEach(item => {
        const span = item.querySelector('span');
        if (span) {
            const text = span.textContent.trim();
            const key = Object.keys(NAVIGATION_LABELS['en']).find(k => 
                NAVIGATION_LABELS['en'][k].toLowerCase() === text.toLowerCase()
            );
            if (key) {
                span.textContent = getLabel(key, currentLanguage);
            }
        }
    });
    
    // Update section labels
    document.querySelectorAll('.nav-section-label').forEach(label => {
        const text = label.textContent.trim();
        const key = Object.keys(NAVIGATION_LABELS['en']).find(k => 
            NAVIGATION_LABELS['en'][k].toLowerCase() === text.toLowerCase()
        );
        if (key) {
            label.textContent = getLabel(key, currentLanguage);
        }
    });
    
    // Update dashboard content
    updateDashboardContent(currentLanguage);
}

// Function to update dashboard content
function updateDashboardContent(language) {
    // Update stat labels
    document.querySelectorAll('.stat-label').forEach(label => {
        const text = label.textContent.trim();
        const key = Object.keys(DASHBOARD_LABELS['en']).find(k => 
            DASHBOARD_LABELS['en'][k].toLowerCase() === text.toLowerCase()
        );
        if (key) {
            label.textContent = getLabel(key, language, 'dashboard');
        }
    });
    
    // Update all text elements that might contain dashboard labels
    document.querySelectorAll('span, div, h1, h2, h3, h4, h5, h6, p, a, button').forEach(element => {
        const text = element.textContent.trim();
        const key = Object.keys(DASHBOARD_LABELS['en']).find(k => 
            DASHBOARD_LABELS['en'][k].toLowerCase() === text.toLowerCase()
        );
        if (key && element.children.length === 0) {
            element.textContent = getLabel(key, language, 'dashboard');
        }
    });
    
    // Update welcome message
    const welcomeElements = document.querySelectorAll('[style*="Welcome back"]');
    welcomeElements.forEach(el => {
        if (language === 'sw') {
            el.textContent = el.textContent.replace('Welcome back', 'Karibu tena');
        }
    });
    
    // Update panel headers
    document.querySelectorAll('.panel-hdr').forEach(header => {
        const text = header.textContent.trim();
        const key = Object.keys(DASHBOARD_LABELS['en']).find(k => 
            DASHBOARD_LABELS['en'][k].toLowerCase() === text.toLowerCase()
        );
        if (key) {
            header.textContent = getLabel(key, language, 'dashboard');
        } else if (text === 'ACTIVE MEMBERS' && language === 'sw') {
            header.textContent = 'WANACHAMA WALIO HAI';
        } else if (text === 'RECENT MEMBERS' && language === 'sw') {
            header.textContent = 'WANACHAMA WA KARIBUNI';
        }
    });
    
    // Update buttons and links
    document.querySelectorAll('button, .btn, .action-btn, a').forEach(element => {
        const text = element.textContent.trim();
        const key = Object.keys(DASHBOARD_LABELS['en']).find(k => 
            DASHBOARD_LABELS['en'][k].toLowerCase() === text.toLowerCase()
        );
        if (key && element.children.length === 0) {
            element.textContent = getLabel(key, language, 'dashboard');
        }
    });
}

// Update labels when page loads and when language changes
document.addEventListener('DOMContentLoaded', updateNavigationLabels);

// Listen for language changes
document.addEventListener('languageChanged', updateNavigationLabels);
</script>
